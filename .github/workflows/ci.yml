name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic
      - name: Lint check
        run: python -m py_compile api/research_api.py && echo "Syntax OK"
      - name: Health check
        run: echo "All checks passed"
